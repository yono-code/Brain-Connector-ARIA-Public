version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "first-monday"
      time: "03:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps(root)"
    groups:
      root-monthly:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/webview"
    schedule:
      interval: "monthly"
      day: "first-monday"
      time: "03:10"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps(webview)"
    groups:
      webview-monthly:
        patterns:
          - "*"
