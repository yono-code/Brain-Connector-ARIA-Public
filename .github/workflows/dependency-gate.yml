name: dependency-gate

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  dependency-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            webview/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: npm --prefix webview ci

      - name: Root vulnerability audit (advisory)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Webview vulnerability audit (advisory)
        run: npm --prefix webview audit --audit-level=high
        continue-on-error: true

      - name: Dependency policy gate (optional)
        run: |
          if [ -f "ai_shared/reviews/dependency-policy.md" ] && [ -f "ai_shared/reviews/dependency-exceptions.md" ]; then
            npm run dependency:gate
          else
            echo "Skip dependency policy gate: policy files not found."
          fi

      - name: No-network code guard
        run: npm run no-network:guard

      - name: Generate SBOM (SPDX)
        run: npm run dependency:sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: artifacts/sbom.spdx.json
